# Run on every commit:  pip install pre-commit && pre-commit install
# Run manually on all files:  pre-commit run --all-files

# Instrument data and captured byte fixtures must never be "fixed": .dat/.sxm/
# .VERT files mix a text header with a binary payload, so content-sniffing
# hooks misidentify them as text and corrupt the payload (observed with
# mixed-line-ending), and the file_cushions are byte-exact by definition.
exclude: '^(test_data/|probeflow/data/)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in lock-step with the ruff pin in constraints.txt — a version
    # mismatch means the hook can pass while CI fails (or vice versa).
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]
      # `ruff-format` is intentionally not enabled yet. Enable after the
      # one-time format pass (Track A of the development plan).
      # - id: ruff-format
