schema_version = 1

# Runtime distributions represented in the frozen desktop applications. The
# collector fails the build if a wheel's license files disappear unexpectedly.
runtime_distributions = [
  "contourpy",
  "cycler",
  "fonttools",
  "gwyfile",
  "ImageIO",
  "joblib",
  "kiwisolver",
  "lazy-loader",
  "matplotlib",
  "networkx",
  "numpy",
  "opencv-python",
  "packaging",
  "pillow",
  "pyinstaller",
  "PySide6",
  "PySide6_Addons",
  "PySide6_Essentials",
  "pyparsing",
  "python-dateutil",
  "scikit-image",
  "scikit-learn",
  "scipy",
  "setuptools",
  "shapely",
  "shiboken6",
  "six",
  "threadpoolctl",
  "tifffile",
]

# These Qt wheels declare their licenses in metadata but omit the full texts.
# The texts and component attributions are taken from the checksum-pinned
# corresponding source archives below.
licenses_from_source_archives = [
  "PySide6",
  "PySide6_Addons",
  "PySide6_Essentials",
  "shiboken6",
]

