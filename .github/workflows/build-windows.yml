name: Build Windows installer

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Windows x64 package
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v4

      - name: Set up CPython 3.13.14 x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.14"
          architecture: x64
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            packaging/windows/constraints-x64.txt
            packaging/windows/requirements-build.txt

      - name: Cache checksum-pinned Qt source archives
        uses: actions/cache@v4
        with:
          path: build/windows/downloads/qt-source
          key: windows-qt-sources-${{ hashFiles('packaging/runtime_licenses.toml') }}

      - name: Install Windows test environment
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest -c packaging/windows/constraints-x64.txt
          python -m pip install -e ".[desktop]" -c packaging/windows/constraints-x64.txt

      - name: Run full test suite on Windows
        shell: pwsh
        run: python -m pytest -q

      - name: Install NSIS 3.12.0
        shell: pwsh
        run: choco install nsis --version=3.12.0 --yes --no-progress

      - name: Build and validate ProbeFlow.exe
        shell: pwsh
        run: pwsh -NoProfile -File scripts/build_windows_app.ps1

      - name: Build and test Windows installer
        shell: pwsh
        run: pwsh -NoProfile -File scripts/build_windows_installer.ps1

      - name: Upload PyInstaller diagnostics after failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ProbeFlow-Windows-build-diagnostics
          path: build/windows/work/ProbeFlow/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload verified Windows package
        uses: actions/upload-artifact@v4
        with:
          name: ProbeFlow-1.0.0-rc1-Windows-x64
          path: |
            build/windows/dist/ProbeFlow-1.0.0-rc1-Windows-x64-Setup.exe
            build/windows/dist/ProbeFlow-1.0.0-rc1-Windows-x64-Setup.exe.sha256
            build/windows/dist/ProbeFlow-1.0.0-rc1-Windows-x64-portable.zip
            build/windows/dist/ProbeFlow-1.0.0-rc1-Windows-x64-portable.zip.sha256
          if-no-files-found: error
          retention-days: 14
